<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1418"/>
      <stop offset="0.65" stop-color="#10231a"/>
      <stop offset="1" stop-color="#143020"/>
    </linearGradient>
    <linearGradient id="fairway" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d4029"/>
      <stop offset="1" stop-color="#0e2417"/>
    </linearGradient>
  </defs>
  <rect width="720" height="200" fill="url(#sky)"/>
  <!-- fairway corridor narrowing to the distance -->
  <path d="M180,200 L330,96 L390,96 L540,200 Z" fill="url(#fairway)"/>
  <path d="M330,96 L390,96 L540,200 L180,200 Z" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.35"/>
  <!-- rough either side -->
  <path d="M0,200 L0,150 Q90,140 180,200 Z" fill="#0a1c11"/>
  <path d="M720,200 L720,150 Q630,140 540,200 Z" fill="#0a1c11"/>
  <!-- trees flanking -->
  <g fill="#081710">
    <path d="M120,160 L136,118 L152,160 Z"/><rect x="133" y="158" width="6" height="14"/>
    <path d="M70,172 L88,124 L106,172 Z"/><rect x="85" y="170" width="6" height="16"/>
    <path d="M584,160 L600,118 L616,160 Z"/><rect x="597" y="158" width="6" height="14"/>
    <path d="M630,172 L648,124 L666,172 Z"/><rect x="645" y="170" width="6" height="16"/>
  </g>
  <!-- target rings at the landing zone -->
  <g transform="translate(360,118)">
    <ellipse rx="46" ry="13" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.45"/>
    <ellipse rx="28" ry="8" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.7"/>
    <ellipse rx="11" ry="3.5" fill="#22c55e" opacity="0.9"/>
  </g>
  <!-- dead-straight flight line down the middle -->
  <path d="M360,200 L360,122" stroke="#f0f4f0" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="2 10" opacity="0.9"/>
  <circle cx="360" cy="118" r="4.5" fill="#f0f4f0"/>
  <!-- crosshair ticks -->
  <g stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <path d="M360,94 L360,104"/>
    <path d="M322,118 L332,118"/>
    <path d="M388,118 L398,118"/>
  </g>
</svg>
